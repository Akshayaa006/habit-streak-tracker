<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Streak Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f3ee; --card: #ffffff; --border: rgba(0,0,0,0.09); --border-md: rgba(0,0,0,0.16);
      --text: #1a1a18; --muted: #6b6a65; --faint: #b0afa9;
      --green: #1D9E75; --green-bg: #E1F5EE; --green-text: #085041; --green-border: #9FE1CB;
      --red: #D85A30; --red-bg: #FAECE7; --red-text: #4A1B0C;
      --r-md: 12px; --r-lg: 18px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110; --card: #1c1c1a; --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.16);
        --text: #e6e4de; --muted: #888784; --faint: #444442;
        --green-bg: #04342C; --green-text: #9FE1CB; --green-border: #0F6E56;
        --red-bg: #4A1B0C; --red-text: #F5C4B3;
      }
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .topbar {
      position: sticky; top: 0; z-index: 50; background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.25rem; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-title { font-size: 13px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
    .topbar-date  { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

    .summary-bar { padding: 1rem 1.25rem 0.5rem; display: flex; gap: 8px; flex-wrap: wrap; max-width: 680px; margin: 0 auto; }
    .summary-pill {
      background: var(--card); border: 0.5px solid var(--border); border-radius: 100px;
      padding: 5px 13px; display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 500;
    }
    .s-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex-shrink: 0; }
    .s-dot.on { background: var(--green); }

    .habit-list { padding: 0.75rem 1.25rem 0; display: flex; flex-direction: column; gap: 10px; max-width: 680px; margin: 0 auto; }

    .habit-card {
      background: var(--card); border: 0.5px solid var(--border); border-radius: var(--r-lg);
      overflow: hidden; transition: border-color 0.2s;
      animation: fadeUp 0.3s ease both;
    }
    .habit-card.expanded { border-color: var(--border-md); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .habit-top {
      padding: 0.9rem 1rem; display: flex; align-items: center; gap: 11px;
      cursor: pointer; user-select: none;
    }
    .habit-top:hover { background: rgba(0,0,0,0.015); }
    @media (prefers-color-scheme: dark) { .habit-top:hover { background: rgba(255,255,255,0.02); } }

    .h-icon {
      width: 42px; height: 42px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center; font-size: 21px;
      flex-shrink: 0; background: var(--bg); border: 0.5px solid var(--border);
      transition: transform 0.15s;
    }
    .habit-top:hover .h-icon { transform: scale(1.06); }

    .h-info { flex: 1; min-width: 0; }
    .h-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .h-sub  { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .h-streak { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
    .h-flame  { font-size: 16px; }
    .h-snum   { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }

    .log-btn {
      width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border-md);
      background: transparent; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .log-btn:hover:not(:disabled) { border-color: var(--green); background: var(--green-bg); transform: scale(1.1); }
    .log-btn:active:not(:disabled) { transform: scale(0.94); }
    .log-btn.done { background: var(--green); border-color: var(--green); cursor: default; }
    .log-btn.done::after {
      content: ''; display: block; width: 6px; height: 11px;
      border-right: 2.5px solid #fff; border-bottom: 2.5px solid #fff;
      transform: rotate(45deg) translate(-1px,-2px);
    }

    .h-chevron {
      width: 16px; height: 16px; flex-shrink: 0; color: var(--faint);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .habit-card.expanded .h-chevron { transform: rotate(180deg); }

    .habit-detail { max-height: 0; overflow: hidden; transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1); }
    .habit-detail.open { max-height: 600px; }
    .habit-detail-inner { border-top: 0.5px solid var(--border); padding: 1rem; }

    .mini-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1rem; }
    .mini-stat { background: var(--bg); border-radius: var(--r-md); padding: 9px 6px; text-align: center; }
    .mini-val { font-size: 20px; font-weight: 500; font-family: 'DM Mono', monospace; }
    .mini-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-top: 2px; }

    .cal-label { font-size: 9px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .cal-grid  { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .cal-dh    { font-size: 7px; text-align: center; color: var(--faint); font-family: 'DM Mono', monospace; padding-bottom: 3px; }
    .cal-dot   { aspect-ratio: 1; border-radius: 50%; border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; }
    .cal-dot.on    { background: var(--dot-color, var(--green)); border-color: var(--dot-color, var(--green)); }
    .cal-dot.today { border-color: var(--muted); border-width: 1.5px; }
    .cal-dot span  { font-size: 7px; font-family: 'DM Mono', monospace; color: var(--faint); }
    .cal-dot.on span { color: #fff; }

    .delete-btn {
      display: flex; align-items: center; gap: 6px;
      margin-top: 1rem; padding: 7px 11px;
      border-radius: var(--r-md); border: 0.5px solid var(--border);
      background: transparent; font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .delete-btn:hover { background: var(--red-bg); color: var(--red-text); border-color: var(--red); }

    .add-section { padding: 0.75rem 1.25rem 4rem; max-width: 680px; margin: 0 auto; }
    .add-toggle {
      width: 100%; padding: 12px; border-radius: var(--r-lg);
      border: 0.5px dashed var(--border-md); background: transparent;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .add-toggle:hover { background: var(--card); border-color: var(--green-border); color: var(--text); }

    .add-form {
      background: var(--card); border: 0.5px solid var(--border-md);
      border-radius: var(--r-lg); padding: 1.1rem; margin-top: 10px; display: none;
    }
    .add-form.open { display: block; }

    .form-lbl { font-size: 9px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; display: block; }

    .icon-picker { display: grid; grid-template-columns: repeat(8,1fr); gap: 5px; margin-bottom: 1rem; }
    .ip-btn {
      aspect-ratio: 1; border-radius: 8px; border: 0.5px solid var(--border);
      background: transparent; font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, border-color 0.1s;
    }
    .ip-btn:hover { background: var(--bg); }
    .ip-btn.sel { border: 2px solid var(--green); background: var(--green-bg); }

    .habit-input {
      width: 100%; padding: 9px 12px; border-radius: var(--r-md);
      border: 0.5px solid var(--border-md); background: transparent;
      font-family: 'Syne', sans-serif; font-size: 14px; color: var(--text);
      outline: none; margin-bottom: 0.8rem; transition: border-color 0.15s;
    }
    .habit-input:focus { border-color: var(--green); }

    .form-btns { display: flex; gap: 8px; }
    .btn-add {
      flex: 1; padding: 10px; border-radius: var(--r-md);
      border: 0.5px solid var(--green-border); background: var(--green-bg);
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 500;
      color: var(--green-text); cursor: pointer; transition: opacity 0.12s;
    }
    .btn-add:hover { opacity: 0.82; }
    .btn-cancel {
      padding: 10px 16px; border-radius: var(--r-md); border: 0.5px solid var(--border);
      background: transparent; font-family: 'Syne', sans-serif; font-size: 13px;
      font-weight: 500; color: var(--muted); cursor: pointer; transition: background 0.12s;
    }
    .btn-cancel:hover { background: var(--bg); }

    .empty {
      text-align: center; padding: 3.5rem 1.5rem 1rem;
      animation: fadeUp 0.4s ease both;
    }
    .empty-emoji { font-size: 52px; margin-bottom: 1rem; }
    .empty-title { font-size: 17px; font-weight: 700; margin-bottom: 0.4rem; }
    .empty-sub   { font-size: 13px; color: var(--muted); line-height: 1.6; }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card); border: 0.5px solid var(--border-md);
      border-radius: 100px; padding: 8px 22px;
      font-size: 13px; font-weight: 500; color: var(--green-text);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none; white-space: nowrap; z-index: 200;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @keyframes streakPop { 0%{transform:scale(1)} 50%{transform:scale(1.35)} 100%{transform:scale(1)} }
    .pop { animation: streakPop 0.32s cubic-bezier(0.34,1.56,0.64,1); }
  </style>
</head>
<body>
  <nav class="topbar">
    <span class="topbar-title">🔥 Streaks</span>
    <span class="topbar-date" id="topbar-date"></span>
  </nav>
  <div class="summary-bar" id="summary-bar"></div>
  <div class="habit-list" id="habit-list"></div>
  <div class="add-section">
    <button class="add-toggle" id="add-toggle">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
      Add a habit
    </button>
    <div class="add-form" id="add-form">
      <label class="form-lbl">Pick an icon</label>
      <div class="icon-picker" id="icon-picker"></div>
      <label class="form-lbl">Habit name</label>
      <input class="habit-input" id="habit-input" type="text" placeholder="e.g. Drink 8 glasses of water" maxlength="44" />
      <div class="form-btns">
        <button class="btn-add" id="btn-add">Add habit</button>
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

<script>
const ICONS=['🏃','💧','📖','🧘','🥗','💪','🎨','✍️','🎵','🌿','🛌','🧠','🚴','🏊','🌅','☕','🎯','🦷','🧹','💊','🛶','🌙','🏋️','🥛'];
const WDAYS=['S','M','T','W','T','F','S'];
const COLORS=['#1D9E75','#378ADD','#D85A30','#D4537E','#7F77DD','#BA7517','#639922','#0F6E56'];

function load(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function pad(n){return String(n).padStart(2,'0');}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function getLast28(){const out=[];for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);out.push(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);}return out;}
function friendlyDate(){return new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function calcStreak(log){
  let s=0;const d=new Date();
  while(true){const k=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;if(log.includes(k)){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}
function calcBest(log){
  if(!log.length)return 0;
  const sorted=[...log].sort();let best=1,cur=1;
  for(let i=1;i<sorted.length;i++){const diff=(new Date(sorted[i])-new Date(sorted[i-1]))/86400000;if(diff===1){cur++;best=Math.max(best,cur);}else cur=1;}
  return best;
}

let habits=load('hb3_habits',[]);
let selIcon=ICONS[0];
let expandedId=null;
function persist(){save('hb3_habits',habits);}

let toastTmr;
function showToast(msg){
  clearTimeout(toastTmr);
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  toastTmr=setTimeout(()=>t.classList.remove('show'),2400);
}

function renderSummary(){
  const bar=document.getElementById('summary-bar');
  if(!habits.length){bar.innerHTML='';return;}
  const today=todayStr();
  const doneCount=habits.filter(h=>h.log.includes(today)).length;
  const total=habits.length;
  const bestActive=habits.reduce((a,h)=>Math.max(a,calcStreak(h.log)),0);
  bar.innerHTML=`
    <div class="summary-pill"><div class="s-dot${doneCount===total&&total>0?' on':''}"></div>${doneCount}/${total} done today</div>
    <div class="summary-pill"><span style="font-family:'DM Mono',monospace;font-size:12px">${bestActive}</span>&nbsp;best streak active</div>`;
}

function renderIconPicker(){
  const p=document.getElementById('icon-picker');
  p.innerHTML=ICONS.map(ic=>`<button class="ip-btn${ic===selIcon?' sel':''}" data-icon="${ic}">${ic}</button>`).join('');
  p.querySelectorAll('.ip-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      selIcon=btn.dataset.icon;
      p.querySelectorAll('.ip-btn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
    });
  });
}

function buildCard(h,idx){
  const today=todayStr();
  const done=h.log.includes(today);
  const streak=calcStreak(h.log);
  const best=calcBest(h.log);
  const isExp=expandedId===h.id;
  const color=h.color||COLORS[0];
  const last28=getLast28();

  const dotHTML=last28.map(d=>{
    const on=h.log.includes(d);
    const isToday=d===today;
    const num=parseInt(d.split('-')[2]);
    return `<div class="cal-dot${on?' on':''}${isToday?' today':''}" ${on?`style="--dot-color:${color}"`:''}><span>${num}</span></div>`;
  }).join('');

  const streakLabel=streak>0?`${streak} day streak`:done?'Day 1!':'No streak yet';

  const card=document.createElement('div');
  card.className=`habit-card${isExp?' expanded':''}`;
  card.style.animationDelay=(idx*55)+'ms';
  card.dataset.id=h.id;

  card.innerHTML=`
    <div class="habit-top">
      <div class="h-icon">${h.icon}</div>
      <div class="h-info">
        <div class="h-name">${esc(h.name)}</div>
        <div class="h-sub">${streakLabel}</div>
      </div>
      <div class="h-streak">
        <span class="h-flame">🔥</span>
        <span class="h-snum snum" style="color:${color}">${streak}</span>
      </div>
      <button class="log-btn${done?' done':''}" data-id="${h.id}" ${done?'disabled':''} title="${done?'Logged today':'Mark done'}"></button>
      <svg class="h-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 8 11 13 6"/></svg>
    </div>
    <div class="habit-detail${isExp?' open':''}">
      <div class="habit-detail-inner">
        <div class="mini-stats">
          <div class="mini-stat"><div class="mini-val" style="color:${color}">${streak}</div><div class="mini-lbl">Current</div></div>
          <div class="mini-stat"><div class="mini-val">${best}</div><div class="mini-lbl">Best</div></div>
          <div class="mini-stat"><div class="mini-val">${h.log.length}</div><div class="mini-lbl">Total</div></div>
        </div>
        <div class="cal-label">Last 28 days</div>
        <div class="cal-grid">
          ${WDAYS.map(d=>`<div class="cal-dh">${d}</div>`).join('')}
          ${dotHTML}
        </div>
        <button class="delete-btn" data-id="${h.id}">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 4 13 4"/><path d="M5 4V3h6v1"/><path d="M4 4l1 9h6l1-9"/></svg>
          Remove habit
        </button>
      </div>
    </div>`;

  card.querySelector('.habit-top').addEventListener('click',e=>{
    if(e.target.closest('.log-btn'))return;
    expandedId=isExp?null:h.id;
    renderAll();
  });

  const lb=card.querySelector('.log-btn');
  if(lb&&!done){
    lb.addEventListener('click',e=>{
      e.stopPropagation();
      logHabit(h.id,color);
    });
  }

  card.querySelector('.delete-btn').addEventListener('click',e=>{
    e.stopPropagation();
    if(confirm(`Remove "${h.name}" and all its data?\nThis cannot be undone.`)){
      habits=habits.filter(x=>x.id!==h.id);
      if(expandedId===h.id)expandedId=null;
      persist();renderAll();
      showToast('Habit removed');
    }
  });

  return card;
}

function logHabit(id,color){
  const today=todayStr();
  const h=habits.find(x=>x.id===id);
  if(!h||h.log.includes(today))return;
  h.log=[...h.log,today];
  persist();

  const streak=calcStreak(h.log);
  const msg=streak>=30?`🔥 ${streak} days — legendary!`
           :streak>=7?`🔥 ${streak}-day streak on "${h.name}"!`
           :streak>1?`🔥 ${streak} days in a row!`
           :`✓ "${h.name}" — day 1 started!`;
  showToast(msg);

  // Quick DOM patch (no full re-render flicker)
  const card=document.querySelector(`.habit-card[data-id="${id}"]`);
  if(card){
    const lb=card.querySelector('.log-btn');
    if(lb){lb.classList.add('done');lb.disabled=true;}
    const sn=card.querySelector('.snum');
    if(sn){sn.textContent=streak;sn.classList.add('pop');setTimeout(()=>sn.classList.remove('pop'),400);}
    const sub=card.querySelector('.h-sub');
    if(sub)sub.textContent=`${streak} day streak`;
    // update expanded mini-stat too
    const mv=card.querySelector('.mini-val');
    if(mv)mv.textContent=streak;
  }
  renderSummary();
}

// Add habit
document.getElementById('add-toggle').addEventListener('click',()=>{
  const f=document.getElementById('add-form');
  f.classList.toggle('open');
  if(f.classList.contains('open')){renderIconPicker();document.getElementById('habit-input').focus();}
});
document.getElementById('btn-cancel').addEventListener('click',()=>{
  document.getElementById('add-form').classList.remove('open');
  document.getElementById('habit-input').value='';
});
document.getElementById('btn-add').addEventListener('click',addHabit);
document.getElementById('habit-input').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});

function addHabit(){
  const name=document.getElementById('habit-input').value.trim();
  if(!name){document.getElementById('habit-input').focus();return;}
  const color=COLORS[habits.length%COLORS.length];
  habits.push({id:uid(),icon:selIcon,name,log:[],color});
  persist();
  document.getElementById('add-form').classList.remove('open');
  document.getElementById('habit-input').value='';
  selIcon=ICONS[0];
  renderAll();
  showToast(`"${name}" added!`);
}

function renderAll(){
  document.getElementById('topbar-date').textContent=friendlyDate();
  renderSummary();
  const list=document.getElementById('habit-list');
  list.innerHTML='';
  if(!habits.length){
    list.innerHTML=`<div class="empty"><div class="empty-emoji">🌱</div><div class="empty-title">No habits yet</div><div class="empty-sub">Add your first habit below<br>and start building your streaks.</div></div>`;
    return;
  }
  habits.forEach((h,i)=>list.appendChild(buildCard(h,i)));
}

renderAll();
</script>
</body>
</html>
